<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResuMate Agent 招聘分析工作台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-light.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app" class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">M</div>
                <div>
                    <h1>ResuMate Agent</h1>
                    <p>招聘分析工作台</p>
                </div>
            </div>

            <nav class="nav-stack" v-if="isAuthenticated">
                <button @click="showUpload" :class="['nav-item', { active: activeNav === 'upload' }]">
                    <i class="fas fa-cloud-arrow-up"></i>
                    <span>上传资料</span>
                </button>
                <button @click="showAnalysis" :class="['nav-item', { active: activeNav === 'analysis' }]">
                    <i class="fas fa-chart-simple"></i>
                    <span>简历匹配分析</span>
                </button>
                <button @click="showQuestions" :class="['nav-item', { active: activeNav === 'questions' }]">
                    <i class="fas fa-list-check"></i>
                    <span>试题生成</span>
                </button>
                <button @click="showFollowup" :class="['nav-item', { active: activeNav === 'followup' }]">
                    <i class="fas fa-comments"></i>
                    <span>追问模拟</span>
                </button>
            </nav>

            <div class="sidebar-foot" v-if="isAuthenticated">
                <div class="user-card">
                    <span>{{ currentUser.username }}</span>
                    <small>{{ currentUser.role }}</small>
                </div>
                <button @click="handleLogout" class="ghost-danger">
                    <i class="fas fa-right-from-bracket"></i>
                    退出登录
                </button>
            </div>
        </aside>

        <main class="workspace">
            <section v-if="!isAuthenticated" class="auth-view">
                <div class="auth-card">
                    <div class="eyebrow">ResuMate Agent</div>
                    <h2>{{ authMode === 'login' ? '登录招聘分析工作台' : '创建工作台账号' }}</h2>
                    <p>集中管理简历与 JD，快速完成岗位匹配分析。</p>

                    <div class="auth-form">
                        <label>
                            <span>用户名</span>
                            <input v-model="authForm.username" type="text" autocomplete="username" placeholder="请输入用户名">
                        </label>
                        <label>
                            <span>密码</span>
                            <input v-model="authForm.password" type="password" autocomplete="current-password" placeholder="请输入密码">
                        </label>
                        <label v-if="authMode === 'register'">
                            <span>角色</span>
                            <select v-model="authForm.role">
                                <option value="user">普通用户</option>
                                <option value="admin">管理员</option>
                            </select>
                        </label>
                        <label v-if="authMode === 'register' && authForm.role === 'admin'">
                            <span>管理员邀请码</span>
                            <input v-model="authForm.admin_code" type="password" placeholder="请输入邀请码">
                        </label>
                        <button class="primary-action wide" :disabled="authLoading" @click="handleAuthSubmit">
                            <i class="fas" :class="authLoading ? 'fa-spinner fa-spin' : 'fa-arrow-right-to-bracket'"></i>
                            {{ authLoading ? '提交中...' : (authMode === 'login' ? '登录' : '注册') }}
                        </button>
                        <button class="text-action" @click="toggleAuthMode">
                            {{ authMode === 'login' ? '没有账号？去注册' : '已有账号？去登录' }}
                        </button>
                    </div>
                </div>
            </section>

            <template v-else>
                <header class="page-header">
                    <div>
                        <div class="eyebrow">{{ pageKicker }}</div>
                        <h2>{{ pageTitle }}</h2>
                    </div>
                    <div class="header-metrics">
                        <div>
                            <strong>{{ resumes.length }}</strong>
                            <span>简历</span>
                        </div>
                        <div>
                            <strong>{{ jds.length }}</strong>
                            <span>JD</span>
                        </div>
                    </div>
                </header>

                <section v-if="activeNav === 'upload'" class="page-scroll">
                    <div class="content-grid two-columns">
                        <article class="panel">
                            <div class="panel-head">
                                <div>
                                    <h3>上传多份简历</h3>
                                    <p>支持 PDF、DOC、DOCX，可拖拽文件到此处或手动选择。</p>
                                </div>
                                <i class="panel-icon fas fa-file-lines"></i>
                            </div>

                            <div
                                :class="['dropzone', { active: resumeDragActive }]"
                                @dragenter.prevent="resumeDragActive = true"
                                @dragover.prevent="resumeDragActive = true"
                                @dragleave.prevent="resumeDragActive = false"
                                @drop.prevent="handleResumeDrop"
                                @click="$refs.resumeFileInput.click()"
                            >
                                <input ref="resumeFileInput" type="file" multiple accept=".pdf,.doc,.docx" @change="handleResumeFileSelect" hidden>
                                <i class="fas fa-cloud-arrow-up"></i>
                                <strong>拖入简历文件</strong>
                                <span>或点击选择文件</span>
                            </div>

                            <div v-if="selectedResumeFiles.length" class="file-queue">
                                <div class="queue-title">
                                    <span>待上传文件</span>
                                    <button class="text-action compact" @click="clearSelectedResumes">清空</button>
                                </div>
                                <div v-for="file in selectedResumeFiles" :key="file.name + file.size" class="file-row">
                                    <i class="fas fa-file-lines"></i>
                                    <span>{{ file.name }}</span>
                                    <small>{{ formatFileSize(file.size) }}</small>
                                </div>
                                <button class="primary-action" :disabled="isUploadingResume" @click="uploadResumes">
                                    <i class="fas" :class="isUploadingResume ? 'fa-spinner fa-spin' : 'fa-upload'"></i>
                                    {{ isUploadingResume ? '上传解析中...' : '上传并解析简历' }}
                                </button>
                            </div>

                            <div v-if="resumeUploadProgress" class="status-note" v-html="parseMarkdown(resumeUploadProgress)"></div>
                        </article>

                        <article class="panel">
                            <div class="panel-head">
                                <div>
                                    <h3>上传 JD</h3>
                                    <p>可粘贴职位描述，也可拖入 TXT/MD 文件自动读取。</p>
                                </div>
                                <i class="panel-icon fas fa-briefcase"></i>
                            </div>

                            <div
                                :class="['compact-dropzone', { active: jdDragActive }]"
                                @dragenter.prevent="jdDragActive = true"
                                @dragover.prevent="jdDragActive = true"
                                @dragleave.prevent="jdDragActive = false"
                                @drop.prevent="handleJDDrop"
                                @click="$refs.jdFileInput.click()"
                            >
                                <input ref="jdFileInput" type="file" accept=".txt,.md,.markdown" @change="handleJDFileSelect" hidden>
                                <i class="fas fa-file-import"></i>
                                <span>拖入 JD 文本文件或点击选择</span>
                            </div>

                            <div class="form-grid">
                                <label>
                                    <span>职位名称</span>
                                    <input v-model="jdForm.title" type="text" placeholder="如：高级算法工程师">
                                </label>
                                <label>
                                    <span>公司名称</span>
                                    <input v-model="jdForm.company" type="text" placeholder="可选">
                                </label>
                            </div>
                            <label class="field-block">
                                <span>JD 内容</span>
                                <textarea v-model="jdForm.jd_text" rows="10" placeholder="粘贴完整岗位职责、任职要求、加分项等内容"></textarea>
                            </label>
                            <button class="primary-action" :disabled="isCreatingJD" @click="createJD">
                                <i class="fas" :class="isCreatingJD ? 'fa-spinner fa-spin' : 'fa-wand-magic-sparkles'"></i>
                                {{ isCreatingJD ? '上传解析中...' : '上传并解析 JD' }}
                            </button>
                            <div v-if="jdCreateProgress" class="status-note">{{ jdCreateProgress }}</div>
                        </article>
                    </div>

                    <div class="content-grid two-columns">
                        <article class="panel">
                            <div class="section-toolbar">
                                <h3>简历库</h3>
                                <button class="secondary-action" @click="loadResumes" :disabled="resumesLoading">
                                    <i class="fas fa-rotate"></i>
                                    刷新
                                </button>
                            </div>
                            <div v-if="resumesLoading" class="empty-state">正在加载简历...</div>
                            <div v-else-if="!resumes.length" class="empty-state">暂无简历，请先上传。</div>
                            <div v-else class="document-list">
                                <div v-for="resume in resumes" :key="resume.id" class="document-row" @click="viewResumeDetail(resume.id)">
                                    <div class="doc-symbol"><i class="fas fa-file-lines"></i></div>
                                    <div class="doc-copy">
                                        <strong>{{ resume.filename }}</strong>
                                        <span>{{ resume.structured_data?.name || '未识别姓名' }} · {{ formatDate(resume.created_at) }}</span>
                                    </div>
                                    <button class="icon-danger" @click.stop="deleteResume(resume.id)" title="删除简历">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </article>

                        <article class="panel">
                            <div class="section-toolbar">
                                <h3>JD 库</h3>
                                <button class="secondary-action" @click="loadJDs" :disabled="jdsLoading">
                                    <i class="fas fa-rotate"></i>
                                    刷新
                                </button>
                            </div>
                            <div v-if="jdsLoading" class="empty-state">正在加载 JD...</div>
                            <div v-else-if="!jds.length" class="empty-state">暂无 JD，请先上传。</div>
                            <div v-else class="document-list">
                                <div v-for="jd in jds" :key="jd.id" class="document-row" @click="viewJDDetail(jd.id)">
                                    <div class="doc-symbol warm"><i class="fas fa-briefcase"></i></div>
                                    <div class="doc-copy">
                                        <strong>{{ jd.title }}</strong>
                                        <span>{{ jd.company || '未填写公司' }} · {{ formatDate(jd.created_at) }}</span>
                                    </div>
                                    <button class="icon-danger" @click.stop="deleteJD(jd.id)" title="删除 JD">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </article>
                    </div>

                    <article v-if="resumeDetail || jdDetail" class="panel detail-panel">
                        <div class="section-toolbar">
                            <h3>{{ resumeDetail ? '简历详情' : 'JD 详情' }}</h3>
                            <button class="icon-button" @click="closeDetails" title="关闭详情">
                                <i class="fas fa-xmark"></i>
                            </button>
                        </div>
                        <div v-if="resumeDetail" class="detail-grid">
                            <div>
                                <span class="detail-label">文件名</span>
                                <strong>{{ resumeDetail.filename }}</strong>
                            </div>
                            <div>
                                <span class="detail-label">候选人</span>
                                <strong>{{ resumeDetail.structured_data?.name || '未识别' }}</strong>
                            </div>
                            <div v-if="resumeDetail.structured_data?.summary" class="detail-wide">
                                <span class="detail-label">摘要</span>
                                <p>{{ resumeDetail.structured_data.summary }}</p>
                            </div>
                            <div v-if="resumeDetail.structured_data?.skills?.length" class="detail-wide">
                                <span class="detail-label">技能标签</span>
                                <div class="tag-cloud">
                                    <span v-for="skill in resumeDetail.structured_data.skills" :key="skill">{{ skill }}</span>
                                </div>
                            </div>
                        </div>
                        <div v-if="jdDetail" class="detail-grid">
                            <div>
                                <span class="detail-label">职位</span>
                                <strong>{{ jdDetail.title }}</strong>
                            </div>
                            <div>
                                <span class="detail-label">公司</span>
                                <strong>{{ jdDetail.company || '未填写' }}</strong>
                            </div>
                            <div v-if="jdDetail.structured_data?.skills?.length" class="detail-wide">
                                <span class="detail-label">核心技能</span>
                                <div class="tag-cloud warm">
                                    <span v-for="skill in jdDetail.structured_data.skills" :key="skill">{{ skill }}</span>
                                </div>
                            </div>
                            <div class="detail-wide raw-text">
                                <span class="detail-label">原始 JD</span>
                                <p>{{ jdDetail.raw_text }}</p>
                            </div>
                        </div>
                    </article>
                </section>

                <section v-if="activeNav === 'analysis'" class="page-scroll">
                    <article class="panel analysis-panel">
                        <div class="panel-head">
                            <div>
                                <h3>JD 与简历匹配程度分析</h3>
                                <p>选择一份 JD 和一份简历，系统将输出匹配度分数与判断理由。</p>
                            </div>
                            <i class="panel-icon fas fa-chart-simple"></i>
                        </div>

                        <div class="analysis-form">
                            <label>
                                <span>目标 JD</span>
                                <select v-model="matchJDId" @change="handleMatchJDChange">
                                    <option value="">请选择 JD</option>
                                    <option v-for="jd in jds" :key="jd.id" :value="jd.id">{{ jd.title }} · {{ jd.company || '未填写公司' }}</option>
                                </select>
                            </label>
                            <label>
                                <span>目标简历</span>
                                <select v-model="matchResumeId">
                                    <option value="">请选择简历</option>
                                    <option v-for="resume in resumes" :key="resume.id" :value="resume.id">{{ resume.filename }} · {{ resume.structured_data?.name || '未识别姓名' }}</option>
                                </select>
                            </label>
                            <button class="primary-action" :disabled="!matchJDId || !matchResumeId || isMatching" @click="runMatch">
                                <i class="fas" :class="isMatching ? 'fa-spinner fa-spin' : 'fa-chart-line'"></i>
                                {{ isMatching ? '分析中...' : '开始匹配分析' }}
                            </button>
                        </div>

                        <div v-if="!resumes.length || !jds.length" class="quiet-warning">
                            需要至少一份简历和一份 JD 才能开始分析，请先到“上传资料”页补充资料。
                        </div>
                    </article>

                    <article v-if="isMatching || matchResult" class="panel result-panel">
                        <div class="score-block">
                            <div class="score-ring" :style="{ '--score': matchScore || 0 }">
                                <strong>{{ matchScoreDisplay }}</strong>
                                <span>匹配度</span>
                            </div>
                            <div>
                                <h3>分析结果</h3>
                                <p>{{ matchSummary }}</p>
                            </div>
                        </div>
                        <div v-if="isMatching && !matchResult" class="empty-state">正在生成匹配度分数和理由...</div>
                        <div v-if="matchResult" class="markdown-result" v-html="parseMarkdown(matchResult)"></div>
                    </article>
                </section>

                <section v-if="activeNav === 'questions'" class="page-scroll">
                    <article class="panel placeholder-panel">
                        <i class="fas fa-list-check"></i>
                        <h3>试题生成</h3>
                        <p>按 JD、简历和岗位能力维度整理面试题。</p>
                        <div class="placeholder-controls">
                            <select disabled><option>选择 JD</option></select>
                            <select disabled><option>题型配置</option></select>
                            <button class="secondary-action" disabled>生成面试题</button>
                        </div>
                    </article>
                </section>

                <section v-if="activeNav === 'followup'" class="page-scroll">
                    <article class="panel placeholder-panel">
                        <i class="fas fa-comments"></i>
                        <h3>追问模拟</h3>
                        <p>围绕候选人经历生成追问，并辅助评估回答质量。</p>
                        <div class="placeholder-controls">
                            <select disabled><option>选择简历</option></select>
                            <textarea disabled rows="4" placeholder="输入候选人回答或追问目标"></textarea>
                            <button class="secondary-action" disabled>生成追问</button>
                        </div>
                    </article>
                </section>
            </template>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
